name: Alex Jackson Lambert
author: Alex Jackson Lambert
description: Software engineer in San Francisco, CA

# URL of your avatar or profile pic (you could use your GitHub profile pic)
avatar: /images/reverie.png

footer-links:
  email: alexjacksonlambert@gmail.com
  github: alex-jl
  linkedin: alex-jackson-lambert

url: http://alex-jl.github.io/reverie
enforce_ssl: https://alex-jl.github.io/reverie

permalink: /:title/

version: v1.2.0

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

sass:
  style: :expanded

plugins:
  - jekyll-sitemap 
  - jekyll-feed 
  - jekyll-seo-tag
  - jekyll-paginate

include: ['_pages']

paginate: 6
paginate_path: /page:num/

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

