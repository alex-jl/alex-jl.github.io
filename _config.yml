name: Alex Jackson Lambert
author: Alex Jackson Lambert
description: Software Engineer

avatar: https://avatars.githubusercontent.com/u/118576078

footer-links:
  email: alexjacksonlambert@gmail.com
  github: alex-jl
  linkedin: alex-jackson-lambert

url: http://alexjl.dev/
enforce_ssl: https://alexjl.dev/

permalink: /:title/

version: v1.2.0

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: 'highlight'

sass:
  style: :expanded

plugins:
  - jekyll-sitemap 
  - jekyll-feed 
  - jekyll-seo-tag
  - jekyll-paginate

include: ['_pages']

paginate: 6
paginate_path: /page:num/

exclude:
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - CNAME

